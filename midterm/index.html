<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="bg-black text-white m-0">

    <nav class="navbar navbar-expand-lg border-bottom border-secondary px-3 py-2 sticky-top bg-black">

        <a class="navbar-brand fw-bold ms-lg-5 fs-4" style="background: linear-gradient(90deg,#ffcc00,#ff7a00,#ff2a00);
               -webkit-background-clip:text;
               background-clip:text;
               -webkit-text-fill-color:transparent;
               text-shadow:0 0 10px rgba(255,140,0,0.4);">
            DRAGONBALL
        </a>

        <ul class="navbar-nav ms-auto me-lg-5 d-flex flex-row gap-4">

            <li><a class="nav-link text-light fw-bold" href="#" onclick="setActive(this); showHome()">Home</a></li>
            <li><a class="nav-link text-light fw-bold" href="#"
                    onclick="setActive(this); showCharacters()">Characters</a></li>
            <li><a class="nav-link text-light fw-bold" href="#" onclick="setActive(this); showStats()">Stats</a></li>

        </ul>

    </nav>

    <section id="homeView" style="opacity:1; transition:0.4s;">

        <section class="container text-center py-5">
            <h2 class="text-warning mb-4">Featured Characters</h2>

            <div class="row g-4 justify-content-center">
                <div class="col-md-4">
                    <div class="card bg-dark text-white border-warning">
                        <img src="https://dragonball-api.com/characters/goku_normal.webp"
                            style="height:500px; object-fit:contain;">
                        <h5 class="text-warning">Goku</h5>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card bg-dark text-white border-warning">
                        <img src="https://dragonball-api.com/characters/vegeta_normal.webp"
                            style="height:500px; object-fit:contain;">
                        <h5 class="text-warning">Vegeta</h5>
                    </div>
                </div>
            </div>
        </section>

    </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
